schema_version: "1"
description: "Subject-matter expert - summoned for one focused software-engineering question; rejects poorly-formed questions"
agent_instructions: agents.md
system_prompt: system-prompt.md
default_harness_config: codex
image: local/darkish-codex:latest
model: gpt-5.5
max_turns: 10
max_duration: "15m"
detached: false
default_mode: sme
volumes:
  - source: ./.scion/skills-staging/sme/
    target: /home/scion/skills/role/
    read_only: true
# Codex auth comes from the user-scope hub secret 'codex_auth' (set via:
# scion hub secret set --type file --target /home/scion/.codex/auth.json codex_auth @~/.codex/auth.json)
hub:
  endpoint: ${DARKEN_HUB_ENDPOINT}
