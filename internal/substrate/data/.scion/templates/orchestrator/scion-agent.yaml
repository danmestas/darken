schema_version: "1"
description: "darken orchestrator - runs the §7 loop, dispatches sub-harnesses, batches escalations to the operator"
agent_instructions: agents.md
system_prompt: system-prompt.md
default_harness_config: claude
image: local/darkish-claude:latest
model: claude-opus-4-7[1m]
max_turns: 200
max_duration: "4h"
detached: false
default_mode: orchestrator
volumes:
  - source: ./.scion/skills-staging/orchestrator/
    target: /home/scion/skills/role/
    read_only: true
hub:
  endpoint: ${DARKEN_HUB_ENDPOINT}
