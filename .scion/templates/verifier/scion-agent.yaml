schema_version: "1"
description: "Verifier - adversarial posture; runs tests, edges, fuzzing; failures loop back up to N times before escalating"
agent_instructions: agents.md
system_prompt: system-prompt.md
default_harness_config: claude
image: local/darkish-claude:latest
model: claude-sonnet-4-6
max_turns: 50
max_duration: "1h"
detached: false
skills:
  - danmestas/agent-skills/skills/tigerstyle
volumes:
  - source: ./.scion/skills-staging/verifier/
    target: /home/scion/skills/role/
    read_only: true
